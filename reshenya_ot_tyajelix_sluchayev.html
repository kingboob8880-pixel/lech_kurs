                                        data-card-id="${card.id}" data-sol-idx="${idx}">${lblAp}</button>` : ''}
                                    <button type="button" class="sol-copy-btn" data-copy-solution-field="all"
                                        data-card-id="${card.id}" data-sol-idx="${idx}">${lblAll}</button>
                                </div>
                                ${arabicHtml}
                                <div class="transcription">${escapeHtml(sol.transcription)}</div>
                                <div class="translation">${escapeHtml(sol.translation)}</div>
                                ${sol.application ? `
                                    <div class="application">
                                        <strong>${currentLang === 'ru' ? 'Применение:' : "Qo'llanishi:"}</strong>
                                        ${escapeHtml(sol.application)}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                    }).join('')}
                </div>
            </div>
        `;

        grid.appendChild(cardEl);
    });

    restoreOpenAccordionKeys(accordionSnap);
    refreshSearchHint();
    refreshFilterContextBar();
    saveSessionSnapshotDebounced();
}

function parseCardIdFromHash() {
    const m = /^#?card-(\d+)$/i.exec(location.hash || '');
    return m ? parseInt(m[1], 10) : null;
}

function cardVisibleUnderCurrentFilters(card) {
    return cardMatchesTypeFilter(card) && cardMatchesSearch(card, normalizeSearchTerm(document.getElementById('searchInput').value));
}

function goToCardId(id, options) {
    const opts = options || {};
    const smooth = opts.smooth !== false;
    const updateHash = opts.updateHash !== false;
    const card = data[currentLang].cards.find(c => c.id === id);
    if (!card) return;

    if (!cardVisibleUnderCurrentFilters(card)) {
        currentFilter = 'all';
        document.getElementById('searchInput').value = '';
        updateCategoryPills();
        refreshFilterContextBar();
        renderCardsNow();
    }

    if (updateHash) {
        const h = 'card-' + id;
        if (location.hash.replace(/^#/, '') !== h) {
            location.hash = h;
        }
    }

    requestAnimationFrame(() => {
        const el = document.getElementById('card-' + id);
        if (el) {
            el.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'start' });
        }
    });
}

function filterJumpDialogList() {
    const inp = document.getElementById('jumpDialogSearch');
    const q = inp ? normalizeSearchTerm(inp.value) : '';
    const items = document.querySelectorAll('#jumpDialogList .jump-dialog-item');
    let n = 0;
    items.forEach(el => {
        const hay = el.dataset.search || '';
        const ok = !q || hay.includes(q);
        el.classList.toggle('hidden', !ok);
        if (ok) n++;
    });
    document.getElementById('jumpDialogEmpty').classList.toggle('hidden', n !== 0);
}

function buildJumpPicker() {
    const listEl = document.getElementById('jumpDialogList');
    const lab = document.getElementById('jumpLabel');
    const openText = document.getElementById('jumpOpenText');
    const dlgTitle = document.getElementById('jumpDialogHeading');
    const searchInp = document.getElementById('jumpDialogSearch');
    const closeBtn = document.getElementById('jumpDialogClose');
    const emptyEl = document.getElementById('jumpDialogEmpty');
    const lang = currentLang;

    lab.textContent = lang === 'ru' ? 'Перейти к решению' : "Yechimga o'tish";
    const ph = lang === 'ru' ? 'Выберите решение…' : 'Yechimni tanlang…';
    openText.textContent = ph;

    dlgTitle.textContent = lang === 'ru' ? 'Выбор решения' : 'Yechimni tanlash';
    searchInp.placeholder = lang === 'ru' ? 'Поиск по названию или №…' : "Nomi yoki № bo'yicha qidirish…";
    closeBtn.setAttribute('aria-label', lang === 'ru' ? 'Закрыть' : 'Yopish');
    emptyEl.textContent = lang === 'ru' ? 'Ничего не найдено' : 'Topilmadi';

    const jumpFab = document.getElementById('jumpFab');
    if (jumpFab) {
        jumpFab.setAttribute('aria-label', ph);
        jumpFab.title = ph;
    }
    const backTopBtn = document.getElementById('backToTop');
    if (backTopBtn) {
        const topLabel = lang === 'ru' ? 'Наверх' : 'Yuqoriga';
        backTopBtn.title = topLabel;
        backTopBtn.setAttribute('aria-label', topLabel);
    }

    listEl.innerHTML = '';

    const categoryNames = {
        ru: { method: 'По способу', goal: 'По цели', rare: 'Редкие' },
        uz: { method: 'Usul', goal: 'Maqsad', rare: 'Kam' }
    };
    const names = categoryNames[lang];

    [...data[lang].cards].sort((a, b) => a.id - b.id).forEach(card => {
        const catLabel = names[card.type];
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'jump-dialog-item';
        btn.dataset.id = String(card.id);
        btn.dataset.search = getCardSearchBlob(card);

        btn.innerHTML = `
            <div class="jump-item-top">
                <span class="jump-item-id">#${card.id}</span>
                <span class="jump-badge jump-badge--${card.type}">${catLabel}</span>
            </div>
            <div class="jump-item-title">${card.title}</div>
            <div class="jump-item-arabic arabic">${card.arabic}</div>
            <div class="jump-item-sub">${card.subtitle}</div>
        `;
        listEl.appendChild(btn);
    });

    filterJumpDialogList();
}

function toggleSolution(header) {
    const content = header.nextElementSibling;
    const isActive = header.classList.contains('active');
    
    header.parentElement.parentElement.querySelectorAll('.solution-header').forEach(h => {
        h.classList.remove('active');
        h.nextElementSibling.classList.remove('active');
    });
    
    if (!isActive) {
        header.classList.add('active');
        content.classList.add('active');
    }
}

// Event Listeners
document.getElementById('searchInput').addEventListener('input', () => {
    scheduleGridRenderFromSearchInput();
});

function registerServiceWorkerBanner() {
    if (!('serviceWorker' in navigator)) return;
    const bannerEl = document.getElementById('offlineBanner');
    const showBanner = () => {
        if (!bannerEl || bannerEl.dataset.shown === '1') return;
        bannerEl.textContent = currentLang === 'ru'
            ? 'Кэш готов — страницу можно открывать офлайн'
            : 'Kesh tayyor — sahifani oflayn ochish mumkin';
        bannerEl.dataset.shown = '1';
        bannerEl.classList.add('visible');
        setTimeout(() => bannerEl.classList.remove('visible'), 9000);
    };
    navigator.serviceWorker.register(new URL('./sw.js', window.location.href), { scope: './' }).then(reg => {
        if (navigator.serviceWorker.controller) showBanner();
        else {
            navigator.serviceWorker.addEventListener('controllerchange', () => showBanner(), { once: true });
        }
        reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
                if (nw.state === 'activated') showBanner();
            });
        });
    }).catch(() => {});
}

const jumpDlg = document.getElementById('jumpDialog');
const jumpOpenBtnEl = document.getElementById('jumpOpenBtn');
const jumpFabEl = document.getElementById('jumpFab');
const jumpDlgSearchEl = document.getElementById('jumpDialogSearch');

function syncJumpDialogExpanded() {
    const expanded = jumpDlg.open ? 'true' : 'false';
    jumpOpenBtnEl.setAttribute('aria-expanded', expanded);
    jumpFabEl.setAttribute('aria-expanded', expanded);
}

function openJumpPicker() {
    jumpDlgSearchEl.value = '';
    filterJumpDialogList();
    jumpDlg.showModal();
    setTimeout(() => jumpDlgSearchEl.focus(), 0);
}

jumpDlg.addEventListener('toggle', syncJumpDialogExpanded);

jumpOpenBtnEl.addEventListener('click', openJumpPicker);
jumpFabEl.addEventListener('click', openJumpPicker);

document.getElementById('jumpDialogClose').addEventListener('click', () => jumpDlg.close());

jumpDlg.addEventListener('click', (e) => {
    if (e.target === jumpDlg) jumpDlg.close();
});

jumpDlgSearchEl.addEventListener('input', filterJumpDialogList);

document.getElementById('jumpDialogList').addEventListener('click', (e) => {
    const row = e.target.closest('.jump-dialog-item');
    if (!row || row.classList.contains('hidden')) return;
    const cardId = parseInt(row.dataset.id, 10);
    if (!Number.isFinite(cardId)) return;
    jumpDlg.close();
    goToCardId(cardId, { smooth: true, updateHash: true });
});

document.getElementById('categories').addEventListener('click', (e) => {
    const pill = e.target.closest('.category-pill');
    if (!pill || !pill.closest('#categories')) return;
    e.preventDefault();
    document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentFilter = pill.dataset.filter;
    refreshFilterContextBar();
    renderCardsNow();
});

// Floating jump FAB + back to top (same scroll threshold as before)
window.addEventListener('scroll', () => {
    const stack = document.getElementById('fabStack');
    if (window.scrollY > 500) {
        stack.classList.add('visible');
    } else {
        stack.classList.remove('visible');
    }
});

// Initialize
syncThemePreferenceToDOM();
const themeCycleBtnEl = document.getElementById('themeCycleBtn');
if (themeCycleBtnEl) {
    themeCycleBtnEl.addEventListener('click', cycleThemePreference);
}

applyLangChrome(currentLang);

updateMethodology();
updateStats();
updateCategoryPills();
buildJumpPicker();
refreshSearchHint();
refreshFilterContextBar();
renderCardsNow();

const hashCardIdInit = parseCardIdFromHash();
if (hashCardIdInit !== null) {
    goToCardId(hashCardIdInit, { smooth: false, updateHash: false });
}

window.addEventListener('hashchange', () => {
    saveSessionSnapshot();
    const cid = parseCardIdFromHash();
    if (cid !== null) {
        goToCardId(cid, { smooth: true, updateHash: false });
    }
});

window.addEventListener('load', () => {
    registerServiceWorkerBanner();
});

saveSessionSnapshot();
</script>
