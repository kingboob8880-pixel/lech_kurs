<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e5631" id="themeColorMeta">
    <meta name="color-scheme" content="light dark">
    <link rel="manifest" href="manifest.webmanifest">
    <title>Руқья - Методы Исцеления | Ruqya - Shifo Usullari</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: #1e5631;
            --primary-light: #2d7a46;
            --accent: #d4af37;
            --accent-light: #f4d03f;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --text-light: #5d6d7e;
            --border: #e1e8ed;
            --body-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --solution-bg: #ffffff;
            --arabic-block-bg: #f0f7f4;
            --quran-block-bg: #fafdfb;
            --jump-hover-bg: #fafdfb;
            --solution-header-hover-bg: #e8f0e9;
            --application-bg: #fff9e6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(53, 49, 49, 0.04);
        }

        html[data-theme="dark"] {
            color-scheme: dark;
            --primary: #3d9660;
            --primary-light: #54b377;
            --accent: #d4af37;
            --accent-light: #fde68a;
            --bg: #0f1712;
            --surface: #1a2920;
            --card-bg: #1e3024;
            --text: #e8eef0;
            --text-light: #9fb3a8;
            --border: #2f4d3a;
            --body-gradient: linear-gradient(135deg, #0f1712 0%, #162820 55%, #0d1812 100%);
            --solution-bg: #17261c;
            --arabic-block-bg: #143222;
            --quran-block-bg: #143222;
            --jump-hover-bg: #243a2b;
            --solution-header-hover-bg: #274434;
            --application-bg: #2e2610;
            --shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
            --shadow-lg: 0 22px 40px rgba(0, 0, 0, 0.5);
        }

        @media (prefers-color-scheme: dark) {
            html[data-theme="auto"] {
                color-scheme: dark;
                --primary: #3d9660;
                --primary-light: #54b377;
                --accent: #d4af37;
                --accent-light: #fde68a;
                --bg: #0f1712;
                --surface: #1a2920;
                --card-bg: #1e3024;
                --text: #e8eef0;
                --text-light: #9fb3a8;
                --border: #2f4d3a;
                --body-gradient: linear-gradient(135deg, #0f1712 0%, #162820 55%, #0d1812 100%);
                --solution-bg: #17261c;
                --arabic-block-bg: #143222;
                --quran-block-bg: #143222;
                --jump-hover-bg: #243a2b;
                --solution-header-hover-bg: #274434;
                --application-bg: #2e2610;
                --shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
                --shadow-lg: 0 22px 40px rgba(0, 0, 0, 0.5);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--body-gradient);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        mark.search-hit {
            background: rgba(212, 175, 55, 0.45);
            padding: 0 0.12em;
            border-radius: 3px;
        }

        .header-controls-row {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.75rem;
        }
        @media (min-width: 769px) {
            .header-controls-row {
                flex-direction: row;
                align-items: center;
                gap: 0.85rem;
            }
        }

        .theme-cycle-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 2.85rem;
            height: 2.5rem;
            padding: 0 0.85rem;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1.15rem;
            cursor: pointer;
            transition: background 0.25s;
        }
        .theme-cycle-btn:hover {
            background: rgba(255, 255, 255, 0.32);
        }
        .theme-cycle-btn:focus-visible {
            outline: 2px solid var(--accent-light);
            outline-offset: 2px;
        }

        /* Toast */
        #toastHost {
            position: fixed;
            bottom: 5.75rem;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            z-index: 200;
            max-width: min(94vw, 22rem);
            padding: 0.65rem 1.1rem;
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            font-size: 0.875rem;
            font-weight: 600;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.35s ease, opacity 0.35s ease;
        }
        #toastHost.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Offline cached banner */
        #offlineBanner {
            display: none;
            max-width: 1200px;
            margin: 0 auto 0.85rem;
            padding: 0.55rem 1rem;
            border-radius: 10px;
            background: rgba(30, 86, 49, 0.12);
            border: 1px solid rgba(30, 86, 49, 0.28);
            color: var(--primary);
            font-size: 0.85rem;
            text-align: center;
        }
        html[data-theme="dark"] #offlineBanner {
            background: rgba(61, 150, 96, 0.15);
            border-color: rgba(61, 150, 96, 0.35);
            color: var(--accent-light);
        }
        @media (prefers-color-scheme: dark) {
            html[data-theme="auto"] #offlineBanner {
                background: rgba(61, 150, 96, 0.15);
                border-color: rgba(61, 150, 96, 0.35);
                color: var(--accent-light);
            }
        }
        #offlineBanner.visible {
            display: block;
        }

        .search-hint {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 0.4rem;
            display: none;
        }
        .search-hint.visible {
            display: block;
        }

        .filter-context-bar {
            font-size: 0.82rem;
            color: var(--text-light);
            margin-bottom: 0.75rem;
            padding: 0.35rem 0.65rem;
            border-radius: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            display: none;
        }
        .filter-context-bar.visible {
            display: block;
        }

        .category-pill--fav svg,
        .category-pill--fav .star-ico {
            display: inline-block;
            margin-right: 0.2rem;
        }

        .arabic {
            font-family: 'Amiri', serif;
            direction: rtl;
        }

        /* Header (mobile-first: не липнет; sticky только от 769px) */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 1.5rem 1rem;
            position: static;
            top: auto;
            box-shadow: var(--shadow-lg);
        }

        @media (min-width: 769px) {
            header {
                position: sticky;
                top: 0;
                z-index: 100;
            }
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.875rem;
            opacity: 0.9;
            margin-top: 0.25rem;
        }

        .author-byline {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-light);
            margin-top: 0.35rem;
            letter-spacing: 0.02em;
        }

        /* Stats Bar */
        .stats-bar {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            margin-top: 0.75rem;
            display: flex;
            gap: 1.5rem;
            font-size: 0.8rem;
            flex-wrap: wrap;
        }
        .stats-bar span {
            opacity: 0.9;
        }
        .stats-bar strong {
            color: var(--accent-light);
        }

        /* Language Switcher */
        .lang-switcher {
            display: flex;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 0.25rem;
            gap: 0.25rem;
        }

        .lang-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.875rem;
        }

        .lang-btn.active {
            background: white;
            color: var(--primary);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Search and Filter */
        .controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.5rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: var(--card-bg);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 86, 49, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        /* Category Pills */
        .categories {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-pill {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border);
            background: var(--card-bg);
            border-radius: 50px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .category-pill:hover,
        .category-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .category-pill .count {
            display: inline-block;
            background: rgba(255,255,255,0.3);
            padding: 0.1rem 0.4rem;
            border-radius: 50px;
            font-size: 0.7rem;
            margin-left: 0.3rem;
        }
        .category-pill.active .count {
            background: rgba(255,255,255,0.3);
        }
        .category-pill:not(.active) .count {
            background: rgba(30,86,49,0.1);
            color: var(--primary);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        /* Card */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
            border: 1px solid var(--border);
            scroll-margin-top: 6rem;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 1.25rem;
            position: relative;
        }

        .card-number {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(255,255,255,0.2);
            padding: 0.2rem 0.5rem;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .card-type {
            display: inline-block;
            background: var(--accent);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .card-arabic {
            font-size: 1.5rem;
            opacity: 0.9;
            margin-top: 0.5rem;
        }

        .card-body {
            padding: 1.25rem;
        }

        .card-desc {
            color: var(--text-light);
            margin-bottom: 1rem;
            font-size: 0.9375rem;
        }

        .card-header-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: 0.9rem;
        }

        .card-header-btn {
            font-size: 0.73rem;
            font-weight: 600;
            padding: 0.38rem 0.65rem;
            border-radius: 9px;
            border: none;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.22);
            color: #fff;
            transition: background 0.2s, transform 0.15s;
        }

        .card-header-btn:hover {
            background: rgba(255, 255, 255, 0.36);
        }

        .card-header-btn:focus-visible {
            outline: 2px solid var(--accent-light);
            outline-offset: 2px;
        }

        .card-header-btn.favorite-active {
            background: rgba(212, 175, 55, 0.45);
            color: #1a3322;
        }

        .solution-copy-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-bottom: 0.85rem;
        }

        .sol-copy-btn {
            font-family: inherit;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.3rem 0.5rem;
            border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--primary);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .sol-copy-btn:hover {
            background: var(--bg);
            border-color: var(--primary-light);
        }

        .sol-copy-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Solutions */
        .solutions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .solution-item {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .solution-header {
            background: var(--bg);
            padding: 0.875rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: var(--primary);
        }

        .solution-header:hover {
            background: var(--solution-header-hover-bg);
        }

        .solution-header.active {
            background: var(--primary);
            color: white;
        }

        .solution-icon {
            transition: transform 0.3s;
        }

        .solution-header.active .solution-icon {
            transform: rotate(180deg);
        }

        .solution-content {
            display: none;
            padding: 1rem;
            background: var(--solution-bg);
        }

        .solution-content.active {
            display: block;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .arabic-text {
            background: var(--arabic-block-bg);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            text-align: center;
            font-size: 1.25rem;
            line-height: 2;
            border-right: 4px solid var(--accent);
        }

        .quran-ayah-block {
            font-family: 'Amiri', serif;
            direction: rtl;
            text-align: justify;
            text-justify: inter-word;
            line-height: 1.85;
            font-size: 1.1rem;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-wrap: break-word;
            background: var(--quran-block-bg);
            padding: 1rem 1.1rem;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            border-right: 4px solid var(--primary);
        }

        .quran-ref-meta {
            margin-bottom: 0.75rem;
        }

        .quran-ref-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-light);
            margin-bottom: 0.35rem;
            text-align: start;
        }

        .quran-ref-short {
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
        }

        .transcription {
            color: var(--text-light);
            font-style: italic;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .translation {
            color: var(--text);
            margin-bottom: 0.75rem;
            font-weight: 500;
        }

        .application {
            background: var(--application-bg);
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.875rem;
            border-left: 3px solid var(--accent);
        }

        .application strong {
            color: var(--primary);
            display: block;
            margin-bottom: 0.25rem;
        }

        /* Results count */
        .results-info {
            text-align: center;
            color: var(--text-light);
            padding: 1rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .results-info strong {
            color: var(--primary);
        }

        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.25rem;
            }

            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .card-arabic {
                font-size: 1.25rem;
            }

            .arabic-text {
                font-size: 1.1rem;
            }

            .quran-ayah-block {
                font-size: 1rem;
                line-height: 1.8;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }

            .card-header {
                padding: 1rem;
            }

            .card-body {
                padding: 1rem;
            }

            .solution-header {
                padding: 0.75rem;
                font-size: 0.875rem;
            }
        }

        /* Print Styles */
        @media print {
            header, .controls, .lang-switcher, .fab-stack, .header-controls-row,
            #toastHost, #offlineBanner, .search-hint, .filter-context-bar,
            .theme-cycle-btn, .solution-copy-toolbar, .card-header-actions {
                display: none !important;
            }
            .card {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }

        /* Utility Classes */
        .hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Floating actions: jump picker + back to top */
        .fab-stack {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .fab-stack.visible {
            opacity: 1;
            visibility: visible;
        }
        .fab-stack .jump-fab,
        .fab-stack .back-to-top {
            position: static;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s;
        }
        .fab-stack .jump-fab {
            background: var(--primary);
            color: white;
            font-size: 1.25rem;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fab-stack .jump-fab:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        .fab-stack .jump-fab:focus-visible {
            outline: 2px solid var(--accent-light);
            outline-offset: 2px;
        }
        .fab-stack .back-to-top {
            background: var(--primary);
            color: white;
            font-size: 1.5rem;
        }
        .fab-stack .back-to-top:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }

        /* Methodology callout */
        .methodology-box {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 14px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.75rem;
            box-shadow: var(--shadow);
        }
        .methodology-box h2 {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 0.75rem;
            font-weight: 700;
        }
        .methodology-box ol {
            margin: 0;
            padding-left: 1.35rem;
            color: var(--text);
            font-size: 0.95rem;
        }
        .methodology-box li {
            margin-bottom: 0.55rem;
            line-height: 1.55;
        }
        .methodology-box li:last-child {
            margin-bottom: 0;
        }

        .jump-row {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        .jump-open-wrap {
            width: 100%;
        }
        @media (min-width: 640px) {
            .jump-row {
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: 0.65rem;
            }
            .jump-row label {
                flex-shrink: 0;
            }
            .jump-open-wrap {
                flex: 1;
                min-width: 260px;
            }
        }
        .jump-row label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }
        .jump-open-btn {
            width: 100%;
            display: flex;
            align-items: center;

<header>
    <div class="header-content">
        <div class="logo">
            <div class="logo-icon">☪</div>
            <div>
                <h1 id="mainTitle">Руқья - Методы Исцеления</h1>
                <div class="subtitle" id="mainSubtitle">Пророческий метод лечения</div>
                <div class="author-byline" id="authorByline">Лекарь Абу Мухаммад</div>
                <div class="stats-bar" id="statsBar">
                    <span>Всего видов: <strong id="totalCount">0</strong></span>
                    <span>По способу: <strong id="methodCount">0</strong></span>
                    <span>По цели: <strong id="goalCount">0</strong></span>
                    <span>Редкие: <strong id="rareCount">0</strong></span>
                    <span id="favoriteStatWrap"><span id="favoriteStatLabel">Избранное</span>: <strong id="favoriteStatCount">0</strong></span>
                </div>
            </div>
        </div>
        <div class="header-controls-row">
            <button type="button" class="theme-cycle-btn" id="themeCycleBtn" aria-label="Тема оформления" title="">A</button>
            <div class="lang-switcher">
            <button class="lang-btn active" onclick="switchLang('ru')" type="button">Русский</button>
            <button class="lang-btn" onclick="switchLang('uz')" type="button">O'zbek</button>
            </div>
        </div>
    </div>
</header>

<div id="toastHost" role="status" aria-live="polite"></div>

<div class="container">
    <div id="offlineBanner" role="status"></div>
    <div class="methodology-box" id="methodologyBox">
        <h2 id="methodologyTitle"></h2>
        <ol id="methodologySteps"></ol>
    </div>
    <div class="controls">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Поиск видов порчи..." autocomplete="off">
            <p id="searchHint" class="search-hint" aria-live="polite"></p>
        </div>
    </div>

    <div class="categories" id="categories">
        <button class="category-pill active" type="button" data-filter="all">Все</button>
        <button class="category-pill category-pill--fav" type="button" data-filter="favorites">Избранное</button>
        <button class="category-pill" type="button" data-filter="method">По способу</button>
        <button class="category-pill" type="button" data-filter="goal">По цели</button>
        <button class="category-pill" type="button" data-filter="rare">Редкие</button>
    </div>
    <p id="filterContextBar" class="filter-context-bar" aria-live="polite"></p>

    <div class="jump-row">
        <label for="jumpOpenBtn" id="jumpLabel"></label>
        <div class="jump-open-wrap">
            <button type="button" id="jumpOpenBtn" class="jump-open-btn" aria-haspopup="dialog" aria-expanded="false" aria-controls="jumpDialog">
                <span class="jump-open-text" id="jumpOpenText"></span>
                <span class="jump-open-chevron" aria-hidden="true"></span>
            </button>
        </div>
    </div>

    <div class="results-info" id="resultsInfo"></div>

    <div class="grid" id="cardsGrid">
        <!-- Cards will be generated by JavaScript -->
    </div>
</div>

<dialog id="jumpDialog" class="jump-dialog" aria-labelledby="jumpDialogHeading">
    <div class="jump-dialog-inner">
        <header class="jump-dialog-header">
            <h3 id="jumpDialogHeading"></h3>
            <button type="button" class="jump-dialog-close" id="jumpDialogClose">&times;</button>
        </header>
        <div class="jump-dialog-search-wrap">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input type="search" id="jumpDialogSearch" autocomplete="off">
        </div>
        <p id="jumpDialogEmpty" class="jump-dialog-empty hidden" role="status"></p>
        <div id="jumpDialogList" class="jump-dialog-list"></div>
    </div>
</dialog>

<div class="fab-stack" id="fabStack">
    <button type="button" id="jumpFab" class="jump-fab" aria-haspopup="dialog" aria-expanded="false" aria-controls="jumpDialog" title="">☰</button>
    <button type="button" class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="">↑</button>
</div>

  "nasr_full": "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ إِذَا جَآءَ نَصْرُ ٱللَّهِ وَٱلْفَتْحُ وَرَأَيْتَ ٱلنَّاسَ يَدْخُلُونَ فِى دِينِ ٱللَّهِ أَفْوَاجًۭا فَسَبِّحْ بِحَمْدِ رَبِّكَ وَٱسْتَغْفِرْهُ ۚ إِنَّهُۥ كَانَ تَوَّابًۢا",
  "isra_82": "وَنُنَزِّلُ مِنَ ٱلْقُرْءَانِ مَا هُوَ شِفَآءٌۭ وَرَحْمَةٌۭ لِّلْمُؤْمِنِينَ ۙ وَلَا يَزِيدُ ٱلظَّٰلِمِينَ إِلَّا خَسَارًۭا",
  "hashr_21_24": "لَوْ أَنزَلْنَا هَٰذَا ٱلْقُرْءَانَ عَلَىٰ جَبَلٍۢ لَّرَأَيْتَهُۥ خَٰشِعًۭا مُّتَصَدِّعًۭا مِّنْ خَشْيَةِ ٱللَّهِ ۚ وَتِلْكَ ٱلْأَمْثَٰلُ نَضْرِبُهَا لِلنَّاسِ لَعَلَّهُمْ يَتَفَكَّرُونَ هُوَ ٱللَّهُ ٱلَّذِى لَآ إِلَٰهَ إِلَّا هُوَ ۖ عَٰلِمُ ٱلْغَيْبِ وَٱلشَّهَٰدَةِ ۖ هُوَ ٱلرَّحْمَٰنُ ٱلرَّحِيمُ هُوَ ٱللَّهُ ٱلَّذِى لَآ إِلَٰهَ إِلَّا هُوَ ٱلْمَلِكُ ٱلْقُدُّوسُ ٱلسَّلَٰمُ ٱلْمُؤْمِنُ ٱلْمُهَيْمِنُ ٱلْعَزِيزُ ٱلْجَبَّارُ ٱلْمُتَكَبِّرُ ۚ سُبْحَٰنَ ٱللَّهِ عَمَّا يُشْرِكُونَ هُوَ ٱللَّهُ ٱلْخَٰلِقُ ٱلْبَارِئُ ٱلْمُصَوِّرُ ۖ لَهُ ٱلْأَسْمَآءُ ٱلْحُسْنَىٰ ۚ يُسَبِّحُ لَهُۥ مَا فِى ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ ۖ وَهُوَ ٱلْعَزِيزُ ٱلْحَكِيمُ",
  "hashr_22_24": "هُوَ ٱللَّهُ ٱلَّذِى لَآ إِلَٰهَ إِلَّا هُوَ ۖ عَٰلِمُ ٱلْغَيْبِ وَٱلشَّهَٰدَةِ ۖ هُوَ ٱلرَّحْمَٰنُ ٱلرَّحِيمُ هُوَ ٱللَّهُ ٱلَّذِى لَآ إِلَٰهَ إِلَّا هُوَ ٱلْمَلِكُ ٱلْقُدُّوسُ ٱلسَّلَٰمُ ٱلْمُؤْمِنُ ٱلْمُهَيْمِنُ ٱلْعَزِيزُ ٱلْجَبَّارُ ٱلْمُتَكَبِّرُ ۚ سُبْحَٰنَ ٱللَّهِ عَمَّا يُشْرِكُونَ هُوَ ٱللَّهُ ٱلْخَٰلِقُ ٱلْبَارِئُ ٱلْمُصَوِّرُ ۖ لَهُ ٱلْأَسْمَآءُ ٱلْحُسْنَىٰ ۚ يُسَبِّحُ لَهُۥ مَا فِى ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ ۖ وَهُوَ ٱلْعَزِيزُ ٱلْحَكِيمُ",
  "yunus_81": "فَلَمَّآ أَلْقَوْا۟ قَالَ مُوسَىٰ مَا جِئْتُم بِهِ ٱلسِّحْرُ ۖ إِنَّ ٱللَّهَ سَيُبْطِلُهُۥٓ ۖ إِنَّ ٱللَّهَ لَا يُصْلِحُ عَمَلَ ٱلْمُفْسِدِينَ",
  "imran_36": "فَلَمَّا وَضَعَتْهَا قَالَتْ رَبِّ إِنِّى وَضَعْتُهَآ أُنثَىٰ وَٱللَّهُ أَعْلَمُ بِمَا وَضَعَتْ وَلَيْسَ ٱلذَّكَرُ كَٱلْأُنثَىٰ ۖ وَإِنِّى سَمَّيْتُهَا مَرْيَمَ وَإِنِّىٓ أُعِيذُهَا بِكَ وَذُرِّيَّتَهَا مِنَ ٱلشَّيْطَٰنِ ٱلرَّجِيمِ",
  "araf_27": "يَٰبَنِىٓ ءَادَمَ لَا يَفْتِنَنَّكُمُ ٱلشَّيْطَٰنُ كَمَآ أَخْرَجَ أَبَوَيْكُم مِّنَ ٱلْجَنَّةِ يَنزِعُ عَنْهُمَا لِبَاسَهُمَا لِيُرِيَهُمَا سَوْءَٰتِهِمَآ ۗ إِنَّهُۥ يَرَىٰكُمْ هُوَ وَقَبِيلُهُۥ مِنْ حَيْثُ لَا تَرَوْنَهُمْ ۗ إِنَّا جَعَلْنَا ٱلشَّيَٰطِينَ أَوْلِيَآءَ لِلَّذِينَ لَا يُؤْمِنُونَ",
  "taha_69_70": "وَأَلْقِ مَا فِى يَمِينِكَ تَلْقَفْ مَا صَنَعُوٓا۟ ۖ إِنَّمَا صَنَعُوا۟ كَيْدُ سَٰحِرٍۢ ۖ وَلَا يُفْلِحُ ٱلسَّاحِرُ حَيْثُ أَتَىٰ فَأُلْقِىَ ٱلسَّحَرَةُ سُجَّدًۭا قَالُوٓا۟ ءَامَنَّا بِرَبِّ هَٰرُونَ وَمُوسَىٰ",
  "anbiya_69": "قُلْنَا يَٰنَارُ كُونِى بَرْدًۭا وَسَلَٰمًا عَلَىٰٓ إِبْرَٰهِيمَ",
  "yasin_1_12": "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ يسٓ وَٱلْقُرْءَانِ ٱلْحَكِيمِ إِنَّكَ لَمِنَ ٱلْمُرْسَلِينَ عَلَىٰ صِرَٰطٍۢ مُّسْتَقِيمٍۢ تَنزِيلَ ٱلْعَزِيزِ ٱلرَّحِيمِ لِتُنذِرَ قَوْمًۭا مَّآ أُنذِرَ ءَابَآؤُهُمْ فَهُمْ غَٰفِلُونَ لَقَدْ حَقَّ ٱلْقَوْلُ عَلَىٰٓ أَكْثَرِهِمْ فَهُمْ لَا يُؤْمِنُونَ إِنَّا جَعَلْنَا فِىٓ أَعْنَٰقِهِمْ أَغْلَٰلًۭا فَهِىَ إِلَى ٱلْأَذْقَانِ فَهُم مُّقْمَحُونَ وَجَعَلْنَا مِنۢ بَيْنِ أَيْدِيهِمْ سَدًّۭا وَمِنْ خَلْفِهِمْ سَدًّۭا فَأَغْشَيْنَٰهُمْ فَهُمْ لَا يُبْصِرُونَ وَسَوَآءٌ عَلَيْهِمْ ءَأَنذَرْتَهُمْ أَمْ لَمْ تُنذِرْهُمْ لَا يُؤْمِنُونَ إِنَّمَا تُنذِرُ مَنِ ٱتَّبَعَ ٱلذِّكْرَ وَخَشِىَ ٱلرَّحْمَٰنَ بِٱلْغَيْبِ ۖ فَبَشِّرْهُ بِمَغْفِرَةٍۢ وَأَجْرٍۢ كَرِيمٍ إِنَّا نَحْنُ نُحْىِ ٱلْمَوْتَىٰ وَنَكْتُبُ مَا قَدَّمُوا۟ وَءَاثَٰرَهُمْ ۚ وَكُلَّ شَىْءٍ أَحْصَيْنَٰهُ فِىٓ إِمَامٍۢ مُّبِينٍۢ",
  "yasin_full": "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ يسٓ وَٱلْقُرْءَانِ ٱلْحَكِيمِ إِنَّكَ لَمِنَ ٱلْمُرْسَلِينَ عَلَىٰ صِرَٰطٍۢ مُّسْتَقِيمٍۢ تَنزِيلَ ٱلْعَزِيزِ ٱلرَّحِيمِ لِتُنذِرَ قَوْمًۭا مَّآ أُنذِرَ ءَابَآؤُهُمْ فَهُمْ غَٰفِلُونَ لَقَدْ حَقَّ ٱلْقَوْلُ عَلَىٰٓ أَكْثَرِهِمْ فَهُمْ لَا يُؤْمِنُونَ إِنَّا جَعَلْنَا فِىٓ أَعْنَٰقِهِمْ أَغْلَٰلًۭا فَهِىَ إِلَى ٱلْأَذْقَانِ فَهُم مُّقْمَحُونَ وَجَعَلْنَا مِنۢ بَيْنِ أَيْدِيهِمْ سَدًّۭا وَمِنْ خَلْفِهِمْ سَدًّۭا فَأَغْشَيْنَٰهُمْ فَهُمْ لَا يُبْصِرُونَ وَسَوَآءٌ عَلَيْهِمْ ءَأَنذَرْتَهُمْ أَمْ لَمْ تُنذِرْهُمْ لَا يُؤْمِنُونَ إِنَّمَا تُنذِرُ مَنِ ٱتَّبَعَ ٱلذِّكْرَ وَخَشِىَ ٱلرَّحْمَٰنَ بِٱلْغَيْبِ ۖ فَبَشِّرْهُ بِمَغْفِرَةٍۢ وَأَجْرٍۢ كَرِيمٍ إِنَّا نَحْنُ نُحْىِ ٱلْمَوْتَىٰ وَنَكْتُبُ مَا قَدَّمُوا۟ وَءَاثَٰرَهُمْ ۚ وَكُلَّ شَىْءٍ أَحْصَيْنَٰهُ فِىٓ إِمَامٍۢ مُّبِينٍۢ وَٱضْرِبْ لَهُم مَّثَلًا أَصْحَٰبَ ٱلْقَرْيَةِ إِذْ جَآءَهَا ٱلْمُرْسَلُونَ إِذْ أَرْسَلْنَآ إِلَيْهِمُ ٱثْنَيْنِ فَكَذَّبُوهُمَا فَعَزَّزْنَا بِثَالِثٍۢ فَقَالُوٓا۟ إِنَّآ إِلَيْكُم مُّرْسَلُونَ قَالُوا۟ مَآ أَنتُمْ إِلَّا بَشَرٌۭ مِّثْلُنَا وَمَآ أَنزَلَ ٱلرَّحْمَٰنُ مِن شَىْءٍ إِنْ أَنتُمْ إِلَّا تَكْذِبُونَ قَالُوا۟ رَبُّنَا يَعْلَمُ إِنَّآ إِلَيْكُمْ لَمُرْسَلُونَ وَمَا عَلَيْنَآ إِلَّا ٱلْبَلَٰغُ ٱلْمُبِينُ قَالُوٓا۟ إِنَّا تَطَيَّرْنَا بِكُمْ ۖ لَئِن لَّمْ تَنتَهُوا۟ لَنَرْجُمَنَّكُمْ وَلَيَمَسَّنَّكُم مِّنَّا عَذَابٌ أَلِيمٌۭ قَالُوا۟ طَٰٓئِرُكُم مَّعَكُمْ ۚ أَئِن ذُكِّرْتُم ۚ بَلْ أَنتُمْ قَوْمٌۭ مُّسْرِفُونَ وَجَآءَ مِنْ أَقْصَا ٱلْمَدِينَةِ رَجُلٌۭ يَسْعَىٰ قَالَ يَٰقَوْمِ ٱتَّبِعُوا۟ ٱلْمُرْسَلِينَ ٱتَّبِعُوا۟ مَن لَّا يَسْـَٔلُكُمْ أَجْرًۭا وَهُم مُّهْتَدُونَ وَمَا لِىَ لَآ أَعْبُدُ ٱلَّذِى فَطَرَنِى وَإِلَيْهِ تُرْجَعُونَ ءَأَتَّخِذُ مِن دُونِهِۦٓ ءَالِهَةً إِن يُرِدْنِ ٱلرَّحْمَٰنُ بِضُرٍّۢ لَّا تُغْنِ عَنِّى شَفَٰعَتُهُمْ شَيْـًۭٔا وَلَا يُنقِذُونِ إِنِّىٓ إِذًۭا لَّفِى ضَلَٰلٍۢ مُّبِينٍ إِنِّىٓ ءَامَنتُ بِرَبِّكُمْ فَٱسْمَعُونِ قِيلَ ٱدْخُلِ ٱلْجَنَّةَ ۖ قَالَ يَٰلَيْتَ قَوْمِى يَعْلَمُونَ بِمَا غَفَرَ لِى رَبِّى وَجَعَلَنِى مِنَ ٱلْمُكْرَمِينَ ۞ وَمَآ أَنزَلْنَا عَلَىٰ قَوْمِهِۦ مِنۢ بَعْدِهِۦ مِن جُندٍۢ مِّنَ ٱلسَّمَآءِ وَمَا كُنَّا مُنزِلِينَ إِن كَانَتْ إِلَّا صَيْحَةًۭ وَٰحِدَةًۭ فَإِذَا هُمْ خَٰمِدُونَ يَٰحَسْرَةً عَلَى ٱلْعِبَادِ ۚ مَا يَأْتِيهِم مِّن رَّسُولٍ إِلَّا كَانُوا۟ بِهِۦ يَسْتَهْزِءُونَ أَلَمْ يَرَوْا۟ كَمْ أَهْلَكْنَا قَبْلَهُم مِّنَ ٱلْقُرُونِ أَنَّهُمْ إِلَيْهِمْ لَا يَرْجِعُونَ وَإِن كُلٌّۭ لَّمَّا جَمِيعٌۭ لَّدَيْنَا مُحْضَرُونَ وَءَايَةٌۭ لَّهُمُ ٱلْأَرْضُ ٱلْمَيْتَةُ أَحْيَيْنَٰهَا وَأَخْرَجْنَا مِنْهَا حَبًّۭا فَمِنْهُ يَأْكُلُونَ وَجَعَلْنَا فِيهَا جَنَّٰتٍۢ مِّن نَّخِيلٍۢ وَأَعْنَٰبٍۢ وَفَجَّرْنَا فِيهَا مِنَ ٱلْعُيُونِ لِيَأْكُلُوا۟ مِن ثَمَرِهِۦ وَمَا عَمِلَتْهُ أَيْدِيهِمْ ۖ أَفَلَا يَشْكُرُونَ سُبْحَٰنَ ٱلَّذِى خَلَقَ ٱلْأَزْوَٰجَ كُلَّهَا مِمَّا تُنۢبِتُ ٱلْأَرْضُ وَمِنْ أَنفُسِهِمْ وَمِمَّا لَا يَعْلَمُونَ وَءَايَةٌۭ لَّهُمُ ٱلَّيْلُ نَسْلَخُ مِنْهُ ٱلنَّهَارَ فَإِذَا هُم مُّظْلِمُونَ وَٱلشَّمْسُ تَجْرِى لِمُسْتَقَرٍّۢ لَّهَا ۚ ذَٰلِكَ تَقْدِيرُ ٱلْعَزِيزِ ٱلْعَلِيمِ وَٱلْقَمَرَ قَدَّرْنَٰهُ مَنَازِلَ حَتَّىٰ عَادَ كَٱلْعُرْجُونِ ٱلْقَدِيمِ لَا ٱلشَّمْسُ يَنۢبَغِى لَهَآ أَن تُدْرِكَ ٱلْقَمَرَ وَلَا ٱلَّيْلُ سَابِقُ ٱلنَّهَارِ ۚ وَكُلٌّۭ فِى فَلَكٍۢ يَسْبَحُونَ وَءَايَةٌۭ لَّهُمْ أَنَّا حَمَلْنَا ذُرِّيَّتَهُمْ فِى ٱلْفُلْكِ ٱلْمَشْحُونِ وَخَلَقْنَا لَهُم مِّن مِّثْلِهِۦ مَا يَرْكَبُونَ وَإِن نَّشَأْ نُغْرِقْهُمْ فَلَا صَرِيخَ لَهُمْ وَلَا هُمْ يُنقَذُونَ إِلَّا رَحْمَةًۭ مِّنَّا وَمَتَٰعًا إِلَىٰ حِينٍۢ وَإِذَا قِيلَ لَهُمُ ٱتَّقُوا۟ مَا بَيْنَ أَيْدِيكُمْ وَمَا خَلْفَكُمْ لَعَلَّكُمْ تُرْحَمُونَ وَمَا تَأْتِيهِم مِّنْ ءَايَةٍۢ مِّنْ ءَايَٰتِ رَبِّهِمْ إِلَّا كَانُوا۟ عَنْهَا مُعْرِضِينَ وَإِذَا قِيلَ لَهُمْ أَنفِقُوا۟ مِمَّا رَزَقَكُمُ ٱللَّهُ قَالَ ٱلَّذِينَ كَفَرُوا۟ لِلَّذِينَ ءَامَنُوٓا۟ أَنُطْعِمُ مَن لَّوْ يَشَآءُ ٱللَّهُ أَطْعَمَهُۥٓ إِنْ أَنتُمْ إِلَّا فِى ضَلَٰلٍۢ مُّبِينٍۢ وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلْوَعْدُ إِن كُنتُمْ صَٰدِقِينَ مَا يَنظُرُونَ إِلَّا صَيْحَةًۭ وَٰحِدَةًۭ تَأْخُذُهُمْ وَهُمْ يَخِصِّمُونَ فَلَا يَسْتَطِيعُونَ تَوْصِيَةًۭ وَلَآ إِلَىٰٓ أَهْلِهِمْ يَرْجِعُونَ وَنُفِخَ فِى ٱلصُّورِ فَإِذَا هُم مِّنَ ٱلْأَجْدَاثِ إِلَىٰ رَبِّهِمْ يَنسِلُونَ قَالُوا۟ يَٰوَيْلَنَا مَنۢ بَعَثَنَا مِن مَّرْقَدِنَا ۜ ۗ هَٰذَا مَا وَعَدَ ٱلرَّحْمَٰنُ وَصَدَقَ ٱلْمُرْسَلُونَ إِن كَانَتْ إِلَّا صَيْحَةًۭ وَٰحِدَةًۭ فَإِذَا هُمْ جَمِيعٌۭ لَّدَيْنَا مُحْضَرُونَ فَٱلْيَوْمَ لَا تُظْلَمُ نَفْسٌۭ شَيْـًۭٔا وَلَا تُجْزَوْنَ إِلَّا مَا كُنتُمْ تَعْمَلُونَ إِنَّ أَصْحَٰبَ ٱلْجَنَّةِ ٱلْيَوْمَ فِى شُغُلٍۢ فَٰكِهُونَ هُمْ وَأَزْوَٰجُهُمْ فِى ظِلَٰلٍ عَلَى ٱلْأَرَآئِكِ مُتَّكِـُٔونَ لَهُمْ فِيهَا فَٰكِهَةٌۭ وَلَهُم مَّا يَدَّعُونَ سَلَٰمٌۭ قَوْلًۭا مِّن رَّبٍّۢ رَّحِيمٍۢ وَٱمْتَٰزُوا۟ ٱلْيَوْمَ أَيُّهَا ٱلْمُجْرِمُونَ ۞ أَلَمْ أَعْهَدْ إِلَيْكُمْ يَٰبَنِىٓ ءَادَمَ أَن لَّا تَعْبُدُوا۟ ٱلشَّيْطَٰنَ ۖ إِنَّهُۥ لَكُمْ عَدُوٌّۭ مُّبِينٌۭ وَأَنِ ٱعْبُدُونِى ۚ هَٰذَا صِرَٰطٌۭ مُّسْتَقِيمٌۭ وَلَقَدْ أَضَلَّ مِنكُمْ جِبِلًّۭا كَثِيرًا ۖ أَفَلَمْ تَكُونُوا۟ تَعْقِلُونَ هَٰذِهِۦ جَهَنَّمُ ٱلَّتِى كُنتُمْ تُوعَدُونَ ٱصْلَوْهَا ٱلْيَوْمَ بِمَا كُنتُمْ تَكْفُرُونَ ٱلْيَوْمَ نَخْتِمُ عَلَىٰٓ أَفْوَٰهِهِمْ وَتُكَلِّمُنَآ أَيْدِيهِمْ وَتَشْهَدُ أَرْجُلُهُم بِمَا كَانُوا۟ يَكْسِبُونَ وَلَوْ نَشَآءُ لَطَمَسْنَا عَلَىٰٓ أَعْيُنِهِمْ فَٱسْتَبَقُوا۟ ٱلصِّرَٰطَ فَأَنَّىٰ يُبْصِرُونَ وَلَوْ نَشَآءُ لَمَسَخْنَٰهُمْ عَلَىٰ مَكَانَتِهِمْ فَمَا ٱسْتَطَٰعُوا۟ مُضِيًّۭا وَلَا يَرْجِعُونَ وَمَن نُّعَمِّرْهُ نُنَكِّسْهُ فِى ٱلْخَلْقِ ۖ أَفَلَا يَعْقِلُونَ وَمَا عَلَّمْنَٰهُ ٱلشِّعْرَ وَمَا يَنۢبَغِى لَهُۥٓ ۚ إِنْ هُوَ إِلَّا ذِكْرٌۭ وَقُرْءَانٌۭ مُّبِينٌۭ لِّيُنذِرَ مَن كَانَ حَيًّۭا وَيَحِقَّ ٱلْقَوْلُ عَلَى ٱلْكَٰفِرِينَ أَوَلَمْ يَرَوْا۟ أَنَّا خَلَقْنَا لَهُم مِّمَّا عَمِلَتْ أَيْدِينَآ أَنْعَٰمًۭا فَهُمْ لَهَا مَٰلِكُونَ وَذَلَّلْنَٰهَا لَهُمْ فَمِنْهَا رَكُوبُهُمْ وَمِنْهَا يَأْكُلُونَ وَلَهُمْ فِيهَا مَنَٰفِعُ وَمَشَارِبُ ۖ أَفَلَا يَشْكُرُونَ وَٱتَّخَذُوا۟ مِن دُونِ ٱللَّهِ ءَالِهَةًۭ لَّعَلَّهُمْ يُنصَرُونَ لَا يَسْتَطِيعُونَ نَصْرَهُمْ وَهُمْ لَهُمْ جُندٌۭ مُّحْضَرُونَ فَلَا يَحْزُنكَ قَوْلُهُمْ ۘ إِنَّا نَعْلَمُ مَا يُسِرُّونَ وَمَا يُعْلِنُونَ أَوَلَمْ يَرَ ٱلْإِنسَٰنُ أَنَّا خَلَقْنَٰهُ مِن نُّطْفَةٍۢ فَإِذَا هُوَ خَصِيمٌۭ مُّبِينٌۭ وَضَرَبَ لَنَا مَثَلًۭا وَنَسِىَ خَلْقَهُۥ ۖ قَالَ مَن يُحْىِ ٱلْعِظَٰمَ وَهِىَ رَمِيمٌۭ قُلْ يُحْيِيهَا ٱلَّذِىٓ أَنشَأَهَآ أَوَّلَ مَرَّةٍۢ ۖ وَهُوَ بِكُلِّ خَلْقٍ عَلِيمٌ ٱلَّذِى جَعَلَ لَكُم مِّنَ ٱلشَّجَرِ ٱلْأَخْضَرِ نَارًۭا فَإِذَآ أَنتُم مِّنْهُ تُوقِدُونَ أَوَلَيْسَ ٱلَّذِى خَلَقَ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضَ بِقَٰدِرٍ عَلَىٰٓ أَن يَخْلُقَ مِثْلَهُم ۚ بَلَىٰ وَهُوَ ٱلْخَلَّٰقُ ٱلْعَلِيمُ إِنَّمَآ أَمْرُهُۥٓ إِذَآ أَرَادَ شَيْـًٔا أَن يَقُولَ لَهُۥ كُن فَيَكُونُ فَسُبْحَٰنَ ٱلَّذِى بِيَدِهِۦ مَلَكُوتُ كُلِّ شَىْءٍۢ وَإِلَيْهِ تُرْجَعُونَ",
  "rum_21_22": "وَمِنْ ءَايَٰتِهِۦٓ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَٰجًۭا لِّتَسْكُنُوٓا۟ إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةًۭ وَرَحْمَةً ۚ إِنَّ فِى ذَٰلِكَ لَءَايَٰتٍۢ لِّقَوْمٍۢ يَتَفَكَّرُونَ وَمِنْ ءَايَٰتِهِۦ خَلْقُ ٱلسَّمَٰوَٰتِ وَٱلْأَرْضِ وَٱخْتِلَٰفُ أَلْسِنَتِكُمْ وَأَلْوَٰنِكُمْ ۚ إِنَّ فِى ذَٰلِكَ لَءَايَٰتٍۢ لِّلْعَٰلِمِينَ",
  "rum_21": "وَمِنْ ءَايَٰتِهِۦٓ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَٰجًۭا لِّتَسْكُنُوٓا۟ إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةًۭ وَرَحْمَةً ۚ إِنَّ فِى ذَٰلِكَ لَءَايَٰتٍۢ لِّقَوْمٍۢ يَتَفَكَّرُونَ",
  "falaq_4": "وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ",
  "falaq_5": "وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ",
  "shuara_80": "وَإِذَا مَرِضْتُ فَهُوَ يَشْفِينِ",
  "rad_7": "وَيَقُولُ ٱلَّذِينَ كَفَرُوا۟ لَوْلَآ أُنزِلَ عَلَيْهِ ءَايَةٌۭ مِّن رَّبِّهِۦٓ ۗ إِنَّمَآ أَنتَ مُنذِرٌۭ ۖ وَلِكُلِّ قَوْمٍ هَادٍ",
  "nur_30_31": "قُل لِّلْمُؤْمِنِينَ يَغُضُّوا۟ مِنْ أَبْصَٰرِهِمْ وَيَحْفَظُوا۟ فُرُوجَهُمْ ۚ ذَٰلِكَ أَزْكَىٰ لَهُمْ ۗ إِنَّ ٱللَّهَ خَبِيرٌۢ بِمَا يَصْنَعُونَ وَقُل لِّلْمُؤْمِنَٰتِ يَغْضُضْنَ مِنْ أَبْصَٰرِهِنَّ وَيَحْفَظْنَ فُرُوجَهُنَّ وَلَا يُبْدِينَ زِينَتَهُنَّ إِلَّا مَا ظَهَرَ مِنْهَا ۖ وَلْيَضْرِبْنَ بِخُمُرِهِنَّ عَلَىٰ جُيُوبِهِنَّ ۖ وَلَا يُبْدِينَ زِينَتَهُنَّ إِلَّا لِبُعُولَتِهِنَّ أَوْ ءَابَآئِهِنَّ أَوْ ءَابَآءِ بُعُولَتِهِنَّ أَوْ أَبْنَآئِهِنَّ أَوْ أَبْنَآءِ بُعُولَتِهِنَّ أَوْ إِخْوَٰنِهِنَّ أَوْ بَنِىٓ إِخْوَٰنِهِنَّ أَوْ بَنِىٓ أَخَوَٰتِهِنَّ أَوْ نِسَآئِهِنَّ أَوْ مَا مَلَكَتْ أَيْمَٰنُهُنَّ أَوِ ٱلتَّٰبِعِينَ غَيْرِ أُو۟لِى ٱلْإِرْبَةِ مِنَ ٱلرِّجَالِ أَوِ ٱلطِّفْلِ ٱلَّذِينَ لَمْ يَظْهَرُوا۟ عَلَىٰ عَوْرَٰتِ ٱلنِّسَآءِ ۖ وَلَا يَضْرِبْنَ بِأَرْجُلِهِنَّ لِيُعْلَمَ مَا يُخْفِينَ مِن زِينَتِهِنَّ ۚ وَتُوبُوٓا۟ إِلَى ٱللَّهِ جَمِيعًا أَيُّهَ ٱلْمُؤْمِنُونَ لَعَلَّكُمْ تُفْلِحُونَ",
  "nur_32": "وَأَنكِحُوا۟ ٱلْأَيَٰمَىٰ مِنكُمْ وَٱلصَّٰلِحِينَ مِنْ عِبَادِكُمْ وَإِمَآئِكُمْ ۚ إِن يَكُونُوا۟ فُقَرَآءَ يُغْنِهِمُ ٱللَّهُ مِن فَضْلِهِۦ ۗ وَٱللَّهُ وَٰسِعٌ عَلِيمٌۭ",
  "taha_25_28": "قَالَ رَبِّ ٱشْرَحْ لِى صَدْرِى وَيَسِّرْ لِىٓ أَمْرِى وَٱحْلُلْ عُقْدَةًۭ مِّن لِّسَانِى يَفْقَهُوا۟ قَوْلِى",
  "imran_103": "وَٱعْتَصِمُوا۟ بِحَبْلِ ٱللَّهِ جَمِيعًۭا وَلَا تَفَرَّقُوا۟ ۚ وَٱذْكُرُوا۟ نِعْمَتَ ٱللَّهِ عَلَيْكُمْ إِذْ كُنتُمْ أَعْدَآءًۭ فَأَلَّفَ بَيْنَ قُلُوبِكُمْ فَأَصْبَحْتُم بِنِعْمَتِهِۦٓ إِخْوَٰنًۭا وَكُنتُمْ عَلَىٰ شَفَا حُفْرَةٍۢ مِّنَ ٱلنَّارِ فَأَنقَذَكُم مِّنْهَا ۗ كَذَٰلِكَ يُبَيِّنُ ٱللَّهُ لَكُمْ ءَايَٰتِهِۦ لَعَلَّكُمْ تَهْتَدُونَ",
  "waqiah_full": "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ إِذَا وَقَعَتِ ٱلْوَاقِعَةُ لَيْسَ لِوَقْعَتِهَا كَاذِبَةٌ خَافِضَةٌۭ رَّافِعَةٌ إِذَا رُجَّتِ ٱلْأَرْضُ رَجًّۭا وَبُسَّتِ ٱلْجِبَالُ بَسًّۭا فَكَانَتْ هَبَآءًۭ مُّنۢبَثًّۭا وَكُنتُمْ أَزْوَٰجًۭا ثَلَٰثَةًۭ فَأَصْحَٰبُ ٱلْمَيْمَنَةِ مَآ أَصْحَٰبُ ٱلْمَيْمَنَةِ وَأَصْحَٰبُ ٱلْمَشْـَٔمَةِ مَآ أَصْحَٰبُ ٱلْمَشْـَٔمَةِ وَٱلسَّٰبِقُونَ ٱلسَّٰبِقُونَ أُو۟لَٰٓئِكَ ٱلْمُقَرَّبُونَ فِى جَنَّٰتِ ٱلنَّعِيمِ ثُلَّةٌۭ مِّنَ ٱلْأَوَّلِينَ وَقَلِيلٌۭ مِّنَ ٱلْءَاخِرِينَ عَلَىٰ سُرُرٍۢ مَّوْضُونَةٍۢ مُّتَّكِـِٔينَ عَلَيْهَا مُتَقَٰبِلِينَ يَطُوفُ عَلَيْهِمْ وِلْدَٰنٌۭ مُّخَلَّدُونَ بِأَكْوَابٍۢ وَأَبَارِيقَ وَكَأْسٍۢ مِّن مَّعِينٍۢ لَّا يُصَدَّعُونَ عَنْهَا وَلَا يُنزِفُونَ وَفَٰكِهَةٍۢ مِّمَّا يَتَخَيَّرُونَ وَلَحْمِ طَيْرٍۢ مِّمَّا يَشْتَهُونَ وَحُورٌ عِينٌۭ كَأَمْثَٰلِ ٱللُّؤْلُؤِ ٱلْمَكْنُونِ جَزَآءًۢ بِمَا كَانُوا۟ يَعْمَلُونَ لَا يَسْمَعُونَ فِيهَا لَغْوًۭا وَلَا تَأْثِيمًا إِلَّا قِيلًۭا سَلَٰمًۭا سَلَٰمًۭا وَأَصْحَٰبُ ٱلْيَمِينِ مَآ أَصْحَٰبُ ٱلْيَمِينِ فِى سِدْرٍۢ مَّخْضُودٍۢ وَطَلْحٍۢ مَّنضُودٍۢ وَظِلٍّۢ مَّمْدُودٍۢ وَمَآءٍۢ مَّسْكُوبٍۢ وَفَٰكِهَةٍۢ كَثِيرَةٍۢ لَّا مَقْطُوعَةٍۢ وَلَا مَمْنُوعَةٍۢ وَفُرُشٍۢ مَّرْفُوعَةٍ إِنَّآ أَنشَأْنَٰهُنَّ إِنشَآءًۭ فَجَعَلْنَٰهُنَّ أَبْكَارًا عُرُبًا أَتْرَابًۭا لِّأَصْحَٰبِ ٱلْيَمِينِ ثُلَّةٌۭ مِّنَ ٱلْأَوَّلِينَ وَثُلَّةٌۭ مِّنَ ٱلْءَاخِرِينَ وَأَصْحَٰبُ ٱلشِّمَالِ مَآ أَصْحَٰبُ ٱلشِّمَالِ فِى سَمُومٍۢ وَحَمِيمٍۢ وَظِلٍّۢ مِّن يَحْمُومٍۢ لَّا بَارِدٍۢ وَلَا كَرِيمٍ إِنَّهُمْ كَانُوا۟ قَبْلَ ذَٰلِكَ مُتْرَفِينَ وَكَانُوا۟ يُصِرُّونَ عَلَى ٱلْحِنثِ ٱلْعَظِيمِ وَكَانُوا۟ يَقُولُونَ أَئِذَا مِتْنَا وَكُنَّا تُرَابًۭا وَعِظَٰمًا أَءِنَّا لَمَبْعُوثُونَ أَوَءَابَآؤُنَا ٱلْأَوَّلُونَ قُلْ إِنَّ ٱلْأَوَّلِينَ وَٱلْءَاخِرِينَ لَمَجْمُوعُونَ إِلَىٰ مِيقَٰتِ يَوْمٍۢ مَّعْلُومٍۢ ثُمَّ إِنَّكُمْ أَيُّهَا ٱلضَّآلُّونَ ٱلْمُكَذِّبُونَ لَءَاكِلُونَ مِن شَجَرٍۢ مِّن زَقُّومٍۢ فَمَالِـُٔونَ مِنْهَا ٱلْبُطُونَ فَشَٰرِبُونَ عَلَيْهِ مِنَ ٱلْحَمِيمِ فَشَٰرِبُونَ شُرْبَ ٱلْهِيمِ هَٰذَا نُزُلُهُمْ يَوْمَ ٱلدِّينِ نَحْنُ خَلَقْنَٰكُمْ فَلَوْلَا تُصَدِّقُونَ أَفَرَءَيْتُم مَّا تُمْنُونَ ءَأَنتُمْ تَخْلُقُونَهُۥٓ أَمْ نَحْنُ ٱلْخَٰلِقُونَ نَحْنُ قَدَّرْنَا بَيْنَكُمُ ٱلْمَوْتَ وَمَا نَحْنُ بِمَسْبُوقِينَ عَلَىٰٓ أَن نُّبَدِّلَ أَمْثَٰلَكُمْ وَنُنشِئَكُمْ فِى مَا لَا تَعْلَمُونَ وَلَقَدْ عَلِمْتُمُ ٱلنَّشْأَةَ ٱلْأُولَىٰ فَلَوْلَا تَذَكَّرُونَ أَفَرَءَيْتُم مَّا تَحْرُثُونَ ءَأَنتُمْ تَزْرَعُونَهُۥٓ أَمْ نَحْنُ ٱلزَّٰرِعُونَ لَوْ نَشَآءُ لَجَعَلْنَٰهُ حُطَٰمًۭا فَظَلْتُمْ تَفَكَّهُونَ إِنَّا لَمُغْرَمُونَ بَلْ نَحْنُ مَحْرُومُونَ أَفَرَءَيْتُمُ ٱلْمَآءَ ٱلَّذِى تَشْرَبُونَ ءَأَنتُمْ أَنزَلْتُمُوهُ مِنَ ٱلْمُزْنِ أَمْ نَحْنُ ٱلْمُنزِلُونَ لَوْ نَشَآءُ جَعَلْنَٰهُ أُجَاجًۭا فَلَوْلَا تَشْكُرُونَ أَفَرَءَيْتُمُ ٱلنَّارَ ٱلَّتِى تُورُونَ ءَأَنتُمْ أَنشَأْتُمْ شَجَرَتَهَآ أَمْ نَحْنُ ٱلْمُنشِـُٔونَ نَحْنُ جَعَلْنَٰهَا تَذْكِرَةًۭ وَمَتَٰعًۭا لِّلْمُقْوِينَ فَسَبِّحْ بِٱسْمِ رَبِّكَ ٱلْعَظِيمِ ۞ فَلَآ أُقْسِمُ بِمَوَٰقِعِ ٱلنُّجُومِ وَإِنَّهُۥ لَقَسَمٌۭ لَّوْ تَعْلَمُونَ عَظِيمٌ إِنَّهُۥ لَقُرْءَانٌۭ كَرِيمٌۭ فِى كِتَٰبٍۢ مَّكْنُونٍۢ لَّا يَمَسُّهُۥٓ إِلَّا ٱلْمُطَهَّرُونَ تَنزِيلٌۭ مِّن رَّبِّ ٱلْعَٰلَمِينَ أَفَبِهَٰذَا ٱلْحَدِيثِ أَنتُم مُّدْهِنُونَ وَتَجْعَلُونَ رِزْقَكُمْ أَنَّكُمْ تُكَذِّبُونَ فَلَوْلَآ إِذَا بَلَغَتِ ٱلْحُلْقُومَ وَأَنتُمْ حِينَئِذٍۢ تَنظُرُونَ وَنَحْنُ أَقْرَبُ إِلَيْهِ مِنكُمْ وَلَٰكِن لَّا تُبْصِرُونَ فَلَوْلَآ إِن كُنتُمْ غَيْرَ مَدِينِينَ تَرْجِعُونَهَآ إِن كُنتُمْ صَٰدِقِينَ فَأَمَّآ إِن كَانَ مِنَ ٱلْمُقَرَّبِينَ فَرَوْحٌۭ وَرَيْحَانٌۭ وَجَنَّتُ نَعِيمٍۢ وَأَمَّآ إِن كَانَ مِنْ أَصْحَٰبِ ٱلْيَمِينِ فَسَلَٰمٌۭ لَّكَ مِنْ أَصْحَٰبِ ٱلْيَمِينِ وَأَمَّآ إِن كَانَ مِنَ ٱلْمُكَذِّبِينَ ٱلضَّآلِّينَ فَنُزُلٌۭ مِّنْ حَمِيمٍۢ وَتَصْلِيَةُ جَحِيمٍ إِنَّ هَٰذَا لَهُوَ حَقُّ ٱلْيَقِينِ فَسَبِّحْ بِٱسْمِ رَبِّكَ ٱلْعَظِيمِ",
  "waqiah_1_40": "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ إِذَا وَقَعَتِ ٱلْوَاقِعَةُ لَيْسَ لِوَقْعَتِهَا كَاذِبَةٌ خَافِضَةٌۭ رَّافِعَةٌ إِذَا رُجَّتِ ٱلْأَرْضُ رَجًّۭا وَبُسَّتِ ٱلْجِبَالُ بَسًّۭا فَكَانَتْ هَبَآءًۭ مُّنۢبَثًّۭا وَكُنتُمْ أَزْوَٰجًۭا ثَلَٰثَةًۭ فَأَصْحَٰبُ ٱلْمَيْمَنَةِ مَآ أَصْحَٰبُ ٱلْمَيْمَنَةِ وَأَصْحَٰبُ ٱلْمَشْـَٔمَةِ مَآ أَصْحَٰبُ ٱلْمَشْـَٔمَةِ وَٱلسَّٰبِقُونَ ٱلسَّٰبِقُونَ أُو۟لَٰٓئِكَ ٱلْمُقَرَّبُونَ فِى جَنَّٰتِ ٱلنَّعِيمِ ثُلَّةٌۭ مِّنَ ٱلْأَوَّلِينَ وَقَلِيلٌۭ مِّنَ ٱلْءَاخِرِينَ عَلَىٰ سُرُرٍۢ مَّوْضُونَةٍۢ مُّتَّكِـِٔينَ عَلَيْهَا مُتَقَٰبِلِينَ يَطُوفُ عَلَيْهِمْ وِلْدَٰنٌۭ مُّخَلَّدُونَ بِأَكْوَابٍۢ وَأَبَارِيقَ وَكَأْسٍۢ مِّن مَّعِينٍۢ لَّا يُصَدَّعُونَ عَنْهَا وَلَا يُنزِفُونَ وَفَٰكِهَةٍۢ مِّمَّا يَتَخَيَّرُونَ وَلَحْمِ طَيْرٍۢ مِّمَّا يَشْتَهُونَ وَحُورٌ عِينٌۭ كَأَمْثَٰلِ ٱللُّؤْلُؤِ ٱلْمَكْنُونِ جَزَآءًۢ بِمَا كَانُوا۟ يَعْمَلُونَ لَا يَسْمَعُونَ فِيهَا لَغْوًۭا وَلَا تَأْثِيمًا إِلَّا قِيلًۭا سَلَٰمًۭا سَلَٰمًۭا وَأَصْحَٰبُ ٱلْيَمِينِ مَآ أَصْحَٰبُ ٱلْيَمِينِ فِى سِدْرٍۢ مَّخْضُودٍۢ وَطَلْحٍۢ مَّنضُودٍۢ وَظِلٍّۢ مَّمْدُودٍۢ وَمَآءٍۢ مَّسْكُوبٍۢ وَفَٰكِهَةٍۢ كَثِيرَةٍۢ لَّا مَقْطُوعَةٍۢ وَلَا مَمْنُوعَةٍۢ وَفُرُشٍۢ مَّرْفُوعَةٍ إِنَّآ أَنشَأْنَٰهُنَّ إِنشَآءًۭ فَجَعَلْنَٰهُنَّ أَبْكَارًا عُرُبًا أَتْرَابًۭا لِّأَصْحَٰبِ ٱلْيَمِينِ ثُلَّةٌۭ مِّنَ ٱلْأَوَّلِينَ وَثُلَّةٌۭ مِّنَ ٱلْءَاخِرِينَ",
  "mulk_full": "بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ تَبَٰرَكَ ٱلَّذِى بِيَدِهِ ٱلْمُلْكُ وَهُوَ عَلَىٰ كُلِّ شَىْءٍۢ قَدِيرٌ ٱلَّذِى خَلَقَ ٱلْمَوْتَ وَٱلْحَيَوٰةَ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلًۭا ۚ وَهُوَ ٱلْعَزِيزُ ٱلْغَفُورُ ٱلَّذِى خَلَقَ سَبْعَ سَمَٰوَٰتٍۢ طِبَاقًۭا ۖ مَّا تَرَىٰ فِى خَلْقِ ٱلرَّحْمَٰنِ مِن تَفَٰوُتٍۢ ۖ فَٱرْجِعِ ٱلْبَصَرَ هَلْ تَرَىٰ مِن فُطُورٍۢ ثُمَّ ٱرْجِعِ ٱلْبَصَرَ كَرَّتَيْنِ يَنقَلِبْ إِلَيْكَ ٱلْبَصَرُ خَاسِئًۭا وَهُوَ حَسِيرٌۭ وَلَقَدْ زَيَّنَّا ٱلسَّمَآءَ ٱلدُّنْيَا بِمَصَٰبِيحَ وَجَعَلْنَٰهَا رُجُومًۭا لِّلشَّيَٰطِينِ ۖ وَأَعْتَدْنَا لَهُمْ عَذَابَ ٱلسَّعِيرِ وَلِلَّذِينَ كَفَرُوا۟ بِرَبِّهِمْ عَذَابُ جَهَنَّمَ ۖ وَبِئْسَ ٱلْمَصِيرُ إِذَآ أُلْقُوا۟ فِيهَا سَمِعُوا۟ لَهَا شَهِيقًۭا وَهِىَ تَفُورُ تَكَادُ تَمَيَّزُ مِنَ ٱلْغَيْظِ ۖ كُلَّمَآ أُلْقِىَ فِيهَا فَوْجٌۭ سَأَلَهُمْ خَزَنَتُهَآ أَلَمْ يَأْتِكُمْ نَذِيرٌۭ قَالُوا۟ بَلَىٰ قَدْ جَآءَنَا نَذِيرٌۭ فَكَذَّبْنَا وَقُلْنَا مَا نَزَّلَ ٱللَّهُ مِن شَىْءٍ إِنْ أَنتُمْ إِلَّا فِى ضَلَٰلٍۢ كَبِيرٍۢ وَقَالُوا۟ لَوْ كُنَّا نَسْمَعُ أَوْ نَعْقِلُ مَا كُنَّا فِىٓ أَصْحَٰبِ ٱلسَّعِيرِ فَٱعْتَرَفُوا۟ بِذَنۢبِهِمْ فَسُحْقًۭا لِّأَصْحَٰبِ ٱلسَّعِيرِ إِنَّ ٱلَّذِينَ يَخْشَوْنَ رَبَّهُم بِٱلْغَيْبِ لَهُم مَّغْفِرَةٌۭ وَأَجْرٌۭ كَبِيرٌۭ وَأَسِرُّوا۟ قَوْلَكُمْ أَوِ ٱجْهَرُوا۟ بِهِۦٓ ۖ إِنَّهُۥ عَلِيمٌۢ بِذَاتِ ٱلصُّدُورِ أَلَا يَعْلَمُ مَنْ خَلَقَ وَهُوَ ٱللَّطِيفُ ٱلْخَبِيرُ هُوَ ٱلَّذِى جَعَلَ لَكُمُ ٱلْأَرْضَ ذَلُولًۭا فَٱمْشُوا۟ فِى مَنَاكِبِهَا وَكُلُوا۟ مِن رِّزْقِهِۦ ۖ وَإِلَيْهِ ٱلنُّشُورُ ءَأَمِنتُم مَّن فِى ٱلسَّمَآءِ أَن يَخْسِفَ بِكُمُ ٱلْأَرْضَ فَإِذَا هِىَ تَمُورُ أَمْ أَمِنتُم مَّن فِى ٱلسَّمَآءِ أَن يُرْسِلَ عَلَيْكُمْ حَاصِبًۭا ۖ فَسَتَعْلَمُونَ كَيْفَ نَذِيرِ وَلَقَدْ كَذَّبَ ٱلَّذِينَ مِن قَبْلِهِمْ فَكَيْفَ كَانَ نَكِيرِ أَوَلَمْ يَرَوْا۟ إِلَى ٱلطَّيْرِ فَوْقَهُمْ صَٰٓفَّٰتٍۢ وَيَقْبِضْنَ ۚ مَا يُمْسِكُهُنَّ إِلَّا ٱلرَّحْمَٰنُ ۚ إِنَّهُۥ بِكُلِّ شَىْءٍۭ بَصِيرٌ أَمَّنْ هَٰذَا ٱلَّذِى هُوَ جُندٌۭ لَّكُمْ يَنصُرُكُم مِّن دُونِ ٱلرَّحْمَٰنِ ۚ إِنِ ٱلْكَٰفِرُونَ إِلَّا فِى غُرُورٍ أَمَّنْ هَٰذَا ٱلَّذِى يَرْزُقُكُمْ إِنْ أَمْسَكَ رِزْقَهُۥ ۚ بَل لَّجُّوا۟ فِى عُتُوٍّۢ وَنُفُورٍ أَفَمَن يَمْشِى مُكِبًّا عَلَىٰ وَجْهِهِۦٓ أَهْدَىٰٓ أَمَّن يَمْشِى سَوِيًّا عَلَىٰ صِرَٰطٍۢ مُّسْتَقِيمٍۢ قُلْ هُوَ ٱلَّذِىٓ أَنشَأَكُمْ وَجَعَلَ لَكُمُ ٱلسَّمْعَ وَٱلْأَبْصَٰرَ وَٱلْأَفْـِٔدَةَ ۖ قَلِيلًۭا مَّا تَشْكُرُونَ قُلْ هُوَ ٱلَّذِى ذَرَأَكُمْ فِى ٱلْأَرْضِ وَإِلَيْهِ تُحْشَرُونَ وَيَقُولُونَ مَتَىٰ هَٰذَا ٱلْوَعْدُ إِن كُنتُمْ صَٰدِقِينَ قُلْ إِنَّمَا ٱلْعِلْمُ عِندَ ٱللَّهِ وَإِنَّمَآ أَنَا۠ نَذِيرٌۭ مُّبِينٌۭ فَلَمَّا رَأَوْهُ زُلْفَةًۭ سِيٓـَٔتْ وُجُوهُ ٱلَّذِينَ كَفَرُوا۟ وَقِيلَ هَٰذَا ٱلَّذِى كُنتُم بِهِۦ تَدَّعُونَ قُلْ أَرَءَيْتُمْ إِنْ أَهْلَكَنِىَ ٱللَّهُ وَمَن مَّعِىَ أَوْ رَحِمَنَا فَمَن يُجِيرُ ٱلْكَٰفِرِينَ مِنْ عَذَابٍ أَلِيمٍۢ قُلْ هُوَ ٱلرَّحْمَٰنُ ءَامَنَّا بِهِۦ وَعَلَيْهِ تَوَكَّلْنَا ۖ فَسَتَعْلَمُونَ مَنْ هُوَ فِى ضَلَٰلٍۢ مُّبِينٍۢ قُلْ أَرَءَيْتُمْ إِنْ أَصْبَحَ مَآؤُكُمْ غَوْرًۭا فَمَن يَأْتِيكُم بِمَآءٍۢ مَّعِينٍۭ",
  "mulk_2": "ٱلَّذِى خَلَقَ ٱلْمَوْتَ وَٱلْحَيَوٰةَ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلًۭا ۚ وَهُوَ ٱلْعَزِيزُ ٱلْغَفُورُ",
  "qasas_24": "فَسَقَىٰ لَهُمَا ثُمَّ تَوَلَّىٰٓ إِلَى ٱلظِّلِّ فَقَالَ رَبِّ إِنِّى لِمَآ أَنزَلْتَ إِلَىَّ مِنْ خَيْرٍۢ فَقِيرٌۭ",
  "taha_114": "فَتَعَٰلَى ٱللَّهُ ٱلْمَلِكُ ٱلْحَقُّ ۗ وَلَا تَعْجَلْ بِٱلْقُرْءَانِ مِن قَبْلِ أَن يُقْضَىٰٓ إِلَيْكَ وَحْيُهُۥ ۖ وَقُل رَّبِّ زِدْنِى عِلْمًۭا",

function isQuranReadingSolution(sol) {
    return sol.title === 'Чтение Корана' || sol.title === "Qur'on o'qish";
}

function getQuranReadingArabic(sol) {
    if (!sol || !isQuranReadingSolution(sol)) return null;
    if (sol.quranArabic) return sol.quranArabic;
    if (sol.quranParts && sol.quranParts.length) {
        const chunks = sol.quranParts.map(function (k) {
            return QURAN_FRAGMENTS[k] || '';
        }).filter(Boolean);
        return chunks.join('\n\n');
    }
    return null;
}

function debounce(fn, waitMs) {
    var t;
    return function () {
        var ctx = this;
        var args = arguments;
        clearTimeout(t);
        t = setTimeout(function () { fn.apply(ctx, args); }, waitMs);
    };
}

function normalizeSearchTerm(raw) {
    return (raw || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function escapeHtml(unsafe) {
    if (unsafe == null) return '';
    return String(unsafe)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function escapeRegExp(str) {
    return String(str).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/** Highlight search hits in escaped HTML (longer tokens first to reduce nesting issues). */
function wrapSearchHighlight(plainText, termNorm) {
    var escaped = escapeHtml(plainText);
    if (!termNorm) return escaped;
    var words = termNorm.split(/\s+/).filter(Boolean);
    if (!words.length) return escaped;
    var uniq = [];
    words.forEach(function (w) {
        if (uniq.indexOf(w) === -1) uniq.push(w);
    });
    uniq.sort(function (a, b) { return b.length - a.length; });
    uniq.forEach(function (w) {
        if (!w.length) return;
        var re = new RegExp(escapeRegExp(w), 'gi');
        escaped = escaped.replace(re, function (m) { return '<mark class="search-hit">' + m + '</mark>'; });
    });
    return escaped;
}

function getSolutionSearchBlob(sol) {
    var chunks = ['', sol.arabic, sol.transcription, sol.translation, sol.application || '', sol.title];
    var qFull = getQuranReadingArabic(sol);
    if (qFull) chunks.push(qFull);
    if (sol.quranParts && sol.quranParts.length) chunks.push(sol.quranParts.join(' '));
    return normalizeSearchTerm(chunks.join(' '));
}

function getCardSearchBlob(card) {
    var parts = [
        '#' + card.id,
        card.title,
        card.subtitle,
        card.arabic,
        card.desc
    ];
    (card.solutions || []).forEach(function (sol) {
        parts.push(getSolutionSearchBlob(sol));
    });
    return normalizeSearchTerm(parts.join(' '));
}

function cardMatchesSearch(card, termNorm) {
    if (!termNorm) return true;
    return getCardSearchBlob(card).indexOf(termNorm) !== -1;
}

function loadFavoriteSetFromStorage() {
    try {
        var raw = localStorage.getItem(LS_FAVORITES_KEY);
        var arr = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(arr)) return new Set();
        return new Set(arr.filter(function (n) {
            var x = typeof n === 'number' ? n : parseInt(n, 10);
            return Number.isFinite(x);
        }));
    } catch (e) {
        return new Set();
    }
}

function saveFavoriteSetToStorage(setObj) {
    try {
        var arr = Array.from(setObj).sort(function (a, b) { return a - b; });
        localStorage.setItem(LS_FAVORITES_KEY, JSON.stringify(arr));
    } catch (e) {}
}

var favoriteIdSet = loadFavoriteSetFromStorage();

/** Copy + toast ------------------------------------------------------------- */
function showToast(text) {
    var el = document.getElementById('toastHost');
    if (!el) return;
    el.textContent = text;
    el.classList.add('visible');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function () { el.classList.remove('visible'); }, 2600);
}

function copyPlainTextFallback(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
}

function copyToClipboard(text) {
    if (!text) return Promise.resolve(false);
    if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text).then(function () { return true; }).catch(function () {
            copyPlainTextFallback(text);
            return true;
        });
    }
    copyPlainTextFallback(text);
    return Promise.resolve(true);
}

/** Theme -------------------------------------------------------------------- */
function getStoredThemePreference() {
    try {
        var v = localStorage.getItem(LS_THEME_KEY);
        if (v === 'light' || v === 'dark' || v === 'auto') return v;
    } catch (e) {}
    return 'auto';
}

var themePreference = getStoredThemePreference();

function syncThemePreferenceToDOM() {
    document.documentElement.setAttribute('data-theme', themePreference);
    var tm = document.getElementById('themeColorMeta');
    if (tm) {
        tm.setAttribute('content', themePreference === 'light' ? '#f8f9fa' : '#1e5631');
    }
    refreshThemeCycleUi();
}

function cycleThemePreference() {
    var order = ['auto', 'light', 'dark'];
    var ix = Math.max(0, order.indexOf(themePreference));
    themePreference = order[(ix + 1) % order.length];
    try { localStorage.setItem(LS_THEME_KEY, themePreference); } catch (e) {}
    syncThemePreferenceToDOM();
}

function refreshThemeCycleUi() {
    var btn = document.getElementById('themeCycleBtn');
    if (!btn) return;
    var lang = typeof currentLang !== 'undefined' ? currentLang : 'ru';
    if (themePreference === 'auto') {
        btn.textContent = '🖥';
        btn.title = lang === 'ru' ? 'Тема: как в системе' : 'Mavzu: tizimdagi';
        btn.setAttribute('aria-label', btn.title);
    } else if (themePreference === 'light') {
        btn.textContent = '☀';
        btn.title = lang === 'ru' ? 'Тема: светлая' : 'Mavzu: yorqin';
        btn.setAttribute('aria-label', btn.title);
    } else {
        btn.textContent = '🌙';
        btn.title = lang === 'ru' ? 'Тема: тёмная' : 'Mavzu: qorong\'u';
        btn.setAttribute('aria-label', btn.title);
    }
}

let currentLang = 'ru';
try {
    const _storedLang = localStorage.getItem(LS_LANG_KEY);
    if (_storedLang === 'ru' || _storedLang === 'uz') currentLang = _storedLang;
} catch (eUnused) {}
let currentFilter = 'all';

var nextAccordionRestoreOverride = undefined;
(function () {
    try {
        const _rawSess = sessionStorage.getItem(SS_SESSION_KEY);
        if (_rawSess) {
            const _s = JSON.parse(_rawSess);
            const _vf = ['all', 'method', 'goal', 'rare', 'favorites'];
            if (_s && _vf.includes(_s.currentFilter)) currentFilter = _s.currentFilter;
            nextAccordionRestoreOverride = _s && typeof _s.openAccordionKeys === 'object' ? _s.openAccordionKeys : undefined;
            if (_s && typeof _s.search === 'string') {
                const si = document.getElementById('searchInput');
                if (si) si.value = _s.search;
            }
            if (_s && _s.hash && /^card-\d+$/i.test(String(_s.hash).replace(/^#/, ''))) {
                history.replaceState(null, '', '#' + String(_s.hash).replace(/^#/, ''));
            }
        }
    } catch (_eIgnore) {}
})();

function updateMethodology() {
    const lang = currentLang;
    const block = data[lang];
    if (!block.methodologyTitle || !block.methodologySteps) return;
    document.getElementById('methodologyTitle').textContent = block.methodologyTitle;
    const ol = document.getElementById('methodologySteps');
    ol.innerHTML = block.methodologySteps.map(step => `<li>${step}</li>`).join('');
}

function applyLangChrome(lang) {
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
        if ((lang === 'ru' && btn.textContent.includes('Рус')) ||
            (lang === 'uz' && btn.textContent.includes("O'z"))) {
            btn.classList.add('active');
        }
    });

    document.getElementById('mainTitle').textContent = lang === 'ru'
        ? 'Руқья - Методы Исцеления' : 'Ruqya - Shifo Usullari';
    document.getElementById('mainSubtitle').textContent = lang === 'ru'
        ? 'Пророческий метод лечения' : "Payg'ambarona davolash usuli";
    document.getElementById('authorByline').textContent = lang === 'ru'
        ? 'Лекарь Абу Мухаммад' : 'Tabib Abu Muhammad';
    document.getElementById('searchInput').placeholder = lang === 'ru'
        ? 'Поиск видов порчи...' : 'Jodugarlik turlarini qidirish...';

    refreshThemeCycleUi();
}

function switchLang(lang) {
    currentLang = lang;
    try {
        localStorage.setItem(LS_LANG_KEY, lang);
    } catch (eLs) {}

    applyLangChrome(lang);
    updateMethodology();
    updateCategoryPills();
    updateStats();
    buildJumpPicker();
    refreshSearchHint();
    refreshFilterContextBar();
    renderCardsNow();
}

function saveSessionSnapshot() {
    try {
        const payload = {
            currentFilter,
            search: document.getElementById('searchInput').value,
            openAccordionKeys: captureOpenAccordionKeys(),
            hash: location.hash.replace(/^#/, '')
        };
        sessionStorage.setItem(SS_SESSION_KEY, JSON.stringify(payload));
    } catch (eSes) {}
}

const saveSessionSnapshotDebounced = debounce(saveSessionSnapshot, 400);

function cardMatchesTypeFilter(card) {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'favorites') return favoriteIdSet.has(card.id);
    return card.type === currentFilter;
}

function captureOpenAccordionKeys() {
    const grid = document.getElementById('cardsGrid');
    /** @type {Record<string, number[]>} */
    const map = {};
    grid.querySelectorAll('.card').forEach(cardEl => {
        const m = /^card-(\d+)/.exec(cardEl.id || '');
        if (!m) return;
        const id = String(m[1]);
        /** @type {number[]} */
        const idxList = [];
        cardEl.querySelectorAll('.solution-item').forEach((item, ix) => {
            const hdr = item.querySelector('.solution-header');
            if (hdr && hdr.classList.contains('active')) idxList.push(ix);
        });
        if (idxList.length) map[id] = idxList;
    });
    return map;
}

function restoreOpenAccordionKeys(map) {
    if (!map) return;
    const grid = document.getElementById('cardsGrid');
    Object.keys(map).forEach(cid => {
        const cardEl = document.getElementById('card-' + cid);
        if (!cardEl) return;
        const idxs = map[cid];
        if (!idxs || !idxs.forEach) return;
        idxs.forEach(ix => {
            const items = cardEl.querySelectorAll('.solution-item');
            const item = items[ix];
            if (!item) return;
            const h = item.querySelector('.solution-header');
            const c = item.querySelector('.solution-content');
            if (h && c) {
                h.classList.add('active');
                c.classList.add('active');
            }
        });
    });
}

function refreshSearchHint() {
    const hint = document.getElementById('searchHint');
    if (!hint) return;
    const q = normalizeSearchTerm(document.getElementById('searchInput').value);
    if (!q.length) {
        hint.classList.remove('visible');
        hint.textContent = '';
        return;
    }
    hint.classList.add('visible');
    hint.textContent = currentLang === 'ru'
        ? 'Ищем также по арабскому, транскрипции, тексту решений и сурам Корана.'
        : "Arab tilida, transkripsiya, matnlar va Qur'ondagi qismlarga qarab qidiramiz.";
}

function refreshFilterContextBar() {
    const bar = document.getElementById('filterContextBar');
    if (!bar) return;
    const sq = normalizeSearchTerm(document.getElementById('searchInput').value);
    const lang = currentLang;
    /** @type {string} */
    let filterLbl = '';
    if (currentFilter === 'all') filterLbl = lang === 'ru' ? 'Все категории' : 'Barcha kategoriyalar';
    else if (currentFilter === 'method') filterLbl = lang === 'ru' ? 'По способу' : "Usul bo'yicha";
    else if (currentFilter === 'goal') filterLbl = lang === 'ru' ? 'По цели' : "Maqsad bo'yicha";
    else if (currentFilter === 'rare') filterLbl = lang === 'ru' ? 'Редкие' : 'Kam uchraydigan';
    else if (currentFilter === 'favorites') filterLbl = lang === 'ru' ? 'Избранное' : 'Tanlangan';

    const parts = [filterLbl];
    if (sq) {
        parts.push(lang === 'ru' ? ('Поиск: «' + escapeHtml(document.getElementById('searchInput').value.trim()) + '»') : ("Qidiruv: «" + escapeHtml(document.getElementById('searchInput').value.trim()) + "»"));
    }
    bar.innerHTML = parts.join(' · ');
    bar.classList.toggle('visible', currentFilter !== 'all' || sq.length > 0);
}

function updateCategoryPills() {
    const lang = currentLang;
    document.querySelectorAll('.category-pill').forEach(pill => {
        const f = pill.dataset.filter;
        const cards = data[lang].cards;
        let count = 0;
        if (f === 'all') count = cards.length;
        else if (f === 'favorites') count = favoriteIdSet.size;
        else count = cards.filter(c => c.type === f).length;

        let label = '';
        if (f === 'all') label = lang === 'ru' ? 'Все' : 'Barchasi';
        else if (f === 'favorites') label = lang === 'ru' ? 'Избранное' : 'Tanlangan';
        else if (f === 'method') label = lang === 'ru' ? 'По способу' : "Usul bo'yicha";
        else if (f === 'goal') label = lang === 'ru' ? 'По цели' : "Maqsad bo'yicha";
        else if (f === 'rare') label = lang === 'ru' ? 'Редкие' : 'Kam uchraydigan';

        pill.innerHTML = `${label} <span class="count">${count}</span>`;
        pill.classList.toggle('active', f === currentFilter);
    });
}

function updateStats() {
    const cards = data[currentLang].cards;
    document.getElementById('totalCount').textContent = cards.length;
    document.getElementById('methodCount').textContent = cards.filter(c => c.type === 'method').length;
    document.getElementById('goalCount').textContent = cards.filter(c => c.type === 'goal').length;
    document.getElementById('rareCount').textContent = cards.filter(c => c.type === 'rare').length;
    const fc = document.getElementById('favoriteStatCount');
    const fl = document.getElementById('favoriteStatLabel');
    if (fc) fc.textContent = String(favoriteIdSet.size);
    if (fl) fl.textContent = currentLang === 'ru' ? 'Избранное' : 'Tanlangan';
}

function stripSolutionHtmlToText(html) {
    const d = document.createElement('div');
    d.innerHTML = html || '';
    return (d.textContent || '').trim();
}

function composePlainArabicForCopy(sol) {
    const qHtml = getQuranReadingArabic(sol);
    if (qHtml) {
        return stripSolutionHtmlToText(qHtml) + (sol.arabic ? '\n' + sol.arabic : '');
    }
    return sol.arabic || '';
}

function composeFullSolutionPlain(sol) {
    const applLabel = currentLang === 'ru' ? 'Применение:' : "Qo'llanishi:";
    const lines = [];
    lines.push(sol.title || '', '');
    lines.push(composePlainArabicForCopy(sol), '');
    lines.push(sol.transcription || '', '');
    lines.push(sol.translation || '');
    if (sol.application) lines.push('', applLabel, sol.application);
    return lines.join('\n');
}

function toastCopiedFlash() {
    showToast(currentLang === 'ru' ? 'Скопировано' : 'Nusxalandi');
}

function copySolutionField(cardId, solIdx, kind) {
    const card = data[currentLang].cards.find(c => c.id === cardId);
    const sol = card && card.solutions[solIdx];
    if (!sol) return;
    let txt = '';
    if (kind === 'arabic') txt = composePlainArabicForCopy(sol);
    else if (kind === 'transcription') txt = sol.transcription || '';
    else if (kind === 'application') txt = sol.application || '';
    else txt = composeFullSolutionPlain(sol);
    copyToClipboard(txt).then(toastCopiedFlash);
}

function toggleFavoriteByCardId(cardId) {
    if (favoriteIdSet.has(cardId)) favoriteIdSet.delete(cardId);
    else favoriteIdSet.add(cardId);
    saveFavoriteSetToStorage(favoriteIdSet);
    updateStats();
    updateCategoryPills();
    renderCardsNow();
}

function expandAllSolutionsForCard(cardId) {
    const cardEl = document.getElementById('card-' + cardId);
    if (!cardEl) return;
    cardEl.querySelectorAll('.solution-item').forEach(item => {
        const hdr = item.querySelector('.solution-header');
        const c = item.querySelector('.solution-content');
        if (!hdr || !c) return;
        hdr.classList.add('active');
        c.classList.add('active');
    });
}

function shareCardById(cardId) {
    const u = new URL(location.href);
    u.hash = 'card-' + cardId;
    const shareUrl = u.toString();
    if (navigator.share && typeof navigator.share === 'function') {
        navigator.share({
            url: shareUrl,
            title: document.getElementById('mainTitle').textContent || 'Ruqya'
        }).catch(() => {
            copyToClipboard(shareUrl).then(toastCopiedFlash);
        });
    } else copyToClipboard(shareUrl).then(toastCopiedFlash);
}

/** Копирование: делегирование клика по решению и карточке */
document.getElementById('cardsGrid').addEventListener('click', (e) => {
    const copyBtn = e.target.closest('[data-copy-solution-field]');
    if (copyBtn) {
        e.preventDefault();
        const cid = parseInt(copyBtn.getAttribute('data-card-id'), 10);
        const idx = parseInt(copyBtn.getAttribute('data-sol-idx'), 10);
        const kind = copyBtn.getAttribute('data-copy-solution-field');
        if (Number.isFinite(cid) && Number.isFinite(idx) && kind) copySolutionField(cid, idx, kind);
        return;
    }
    const fav = e.target.closest('[data-action="toggle-favorite"]');
    if (fav) {
        const cid = parseInt(fav.getAttribute('data-card-id'), 10);
        if (Number.isFinite(cid)) toggleFavoriteByCardId(cid);
        return;
    }
    const shr = e.target.closest('[data-action="share-card"]');
    if (shr) {
        const cid = parseInt(shr.getAttribute('data-card-id'), 10);
        if (Number.isFinite(cid)) shareCardById(cid);
        return;
    }
    const expand = e.target.closest('[data-action="expand-all-card"]');
    if (expand) {
        const cid = parseInt(expand.getAttribute('data-card-id'), 10);
        if (Number.isFinite(cid)) expandAllSolutionsForCard(cid);
        return;
    }
    const hdr = e.target.closest('.solution-header');
    if (hdr && hdr.closest('#cardsGrid')) {
        toggleSolution(hdr);
    }
});

const scheduleGridRenderFromSearchInput = debounce(() => renderCardsInner(), 220);

function renderCardsNow() {
    renderCardsInner();
}

function renderCardsInner() {
    const grid = document.getElementById('cardsGrid');
    /** @type {Record<string, number[]>} */
    let accordionSnap = {};
    if (nextAccordionRestoreOverride !== undefined) {
        accordionSnap = nextAccordionRestoreOverride;
        nextAccordionRestoreOverride = undefined;
    } else accordionSnap = captureOpenAccordionKeys();

    const termNorm = normalizeSearchTerm(document.getElementById('searchInput').value);

    const filteredCards = data[currentLang].cards.filter(card => {
        const matchesTF = cardMatchesTypeFilter(card);
        const ms = cardMatchesSearch(card, termNorm);
        return matchesTF && ms;
    });

    const resultsInfo = document.getElementById('resultsInfo');
    if (!filteredCards.length && currentFilter === 'favorites') {
        resultsInfo.innerHTML = currentLang === 'ru'
            ? 'В избранном пока пусто. Нажмите <strong>★</strong> на карточке, чтобы сохранить.'
            : 'Tanlanganlarda bo‘sh. Saqlash uchun kartochkadagi <strong>★</strong> boshing.';

        resultsInfo.innerHTML = currentLang === 'ru'
